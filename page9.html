<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal Video Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: #121212; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .container { width: 100%; max-width: 500px; background: #1e1e1e; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); text-align: center; }
        
        /* Player Box */
        #playerArea { width: 100%; min-height: 250px; background: #000; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video, iframe { width: 100%; height: 250px; border: none; border-radius: 12px; }
        
        input { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 8px; margin-bottom: 10px; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #e50914; border: none; color: #fff; border-radius: 8px; font-weight: 600; cursor: pointer; }
        button:hover { background: #b20710; }
        p { font-size: 13px; color: #aaa; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎥 Universal Player</h2>
    <p>Paste direct video link OR website's Embed Code</p>

    <!-- Yaha video ya iframe chalega -->
    <div id="playerArea">
        <span style="color: #666;">Video yaha chalegi...</span>
    </div>

    <!-- Link dalne ka box -->
    <input type="text" id="videoInput" placeholder="Paste link or <iframe...> code here">
    <button onclick="playContent()">Play Now</button>
</div>

<script>
    function playContent() {
        let input = document.getElementById('videoInput').value.trim();
        let playerArea = document.getElementById('playerArea');

        if (!input) {
            alert("Bhai kuch toh daalo box me!");
            return;
        }

        // Agar user ne Embed (iframe) code dala hai
        if (input.toLowerCase().includes('<iframe')) {
            playerArea.innerHTML = input;
        } 
        // Agar user ne direct link dala hai
        else {
            playerArea.innerHTML = `<video controls playsinline autoplay src="${input}"></video>`;
        }
    }
</script>

</body>
</html>
